<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Debug API Test</title>
</head>
<body>
  <h1>API Debug Test</h1>
  <div id="result"></div>
  
  <script type="module">
    // Get env variables
    const API_BASE_URL = import.meta.env.VITE_API_BASE_URL || 'http://localhost:3000/api/v1';
    const DEFAULT_TENANT = import.meta.env.VITE_DEFAULT_TENANT || 'MAJU1234';
    
    document.getElementById('result').innerHTML = `
      <p>API_BASE_URL: ${API_BASE_URL}</p>
      <p>DEFAULT_TENANT: ${DEFAULT_TENANT}</p>
    `;
    
    // Test API call
    console.log('Testing API call...');
    console.log('API_BASE_URL:', API_BASE_URL);
    console.log('DEFAULT_TENANT:', DEFAULT_TENANT);
    
    const url = `${API_BASE_URL}/public/items?kode=${DEFAULT_TENANT}&page=1&limit=4`;
    console.log('Full URL:', url);
    
    fetch(url)
      .then(response => {
        console.log('Response status:', response.status);
        return response.json();
      })
      .then(data => {
        console.log('API Response:', data);
        document.getElementById('result').innerHTML += `
          <h2>API Response:</h2>
          <pre>${JSON.stringify(data, null, 2)}</pre>
          <p>Items count: ${Array.isArray(data.data) ? data.data.length : 'N/A'}</p>
        `;
        
        // Render items
        if (data.success && data.data && data.data.length > 0) {
          const container = document.createElement('div');
          container.style.display = 'grid';
          container.style.gridTemplateColumns = 'repeat(2, 1fr)';
          container.style.gap = '16px';
          container.style.marginTop = '20px';
          
          data.data.forEach(item => {
            const card = document.createElement('div');
            card.style.border = '1px solid #ddd';
            card.style.padding = '16px';
            card.style.borderRadius = '8px';
            card.innerHTML = `
              <h3>${item.name}</h3>
              <p>Type: ${item.type}</p>
              <p>Price: ${item.price}</p>
              <p>Available: ${item.isAvailable ? 'Yes' : 'No'}</p>
            `;
            container.appendChild(card);
          });
          
          document.body.appendChild(container);
        }
      })
      .catch(error => {
        console.error('API Error:', error);
        document.getElementById('result').innerHTML += `
          <h2 style="color: red;">API Error:</h2>
          <pre>${error.message}</pre>
        `;
      });
  </script>
</body>
</html>
