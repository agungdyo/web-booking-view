<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Env Check</title>
</head>
<body>
  <h1>Environment Variables Check</h1>
  <div id="result"></div>
  
  <script type="module">
    const result = document.getElementById('result');
    
    // Check VITE_ prefixed variables
    const apiBaseUrl = import.meta.env.VITE_API_BASE_URL;
    const defaultTenant = import.meta.env.VITE_DEFAULT_TENANT;
    
    result.innerHTML = `
      <h2>VITE Environment Variables</h2>
      <table border="1" cellpadding="10" style="border-collapse: collapse;">
        <tr>
          <th>Variable</th>
          <th>Value</th>
          <th>Status</th>
        </tr>
        <tr>
          <td>VITE_API_BASE_URL</td>
          <td><code>${apiBaseUrl || 'undefined'}</code></td>
          <td style="color: ${apiBaseUrl ? 'green' : 'red'}">${apiBaseUrl ? '✓ Set' : '✗ Not Set'}</td>
        </tr>
        <tr>
          <td>VITE_DEFAULT_TENANT</td>
          <td><code>${defaultTenant || 'undefined'}</code></td>
          <td style="color: ${defaultTenant ? 'green' : 'red'}">${defaultTenant ? '✓ Set' : '✗ Not Set'}</td>
        </tr>
      </table>
      
      <h2 style="margin-top: 30px;">Fallback Values</h2>
      <table border="1" cellpadding="10" style="border-collapse: collapse;">
        <tr>
          <th>Variable</th>
          <th>Fallback Value</th>
        </tr>
        <tr>
          <td>API_BASE_URL</td>
          <td><code>${apiBaseUrl || 'http://localhost:3000/api/v1'}</code></td>
        </tr>
        <tr>
          <td>DEFAULT_TENANT</td>
          <td><code>${defaultTenant || 'MAJU1234'}</code></td>
        </tr>
      </table>
      
      <h2 style="margin-top: 30px;">Test API Call</h2>
      <button id="testBtn">Test API Call</button>
      <pre id="apiResult" style="background: #f5f5f5; padding: 15px; overflow: auto;"></pre>
    `;
    
    // Test API button
    document.getElementById('testBtn').addEventListener('click', async () => {
      const resultDiv = document.getElementById('apiResult');
      resultDiv.textContent = 'Loading...';
      
      try {
        const baseUrl = apiBaseUrl || 'http://localhost:3000/api/v1';
        const tenant = defaultTenant || 'MAJU1234';
        const url = `${baseUrl}/public/items?kode=${tenant}&page=1&limit=2`;
        
        resultDiv.textContent = `Calling: ${url}\n\n`;
        
        const response = await fetch(url);
        const data = await response.json();
        
        resultDiv.textContent += `Status: ${response.status}\n`;
        resultDiv.textContent += `Success: ${data.success}\n`;
        resultDiv.textContent += `Items count: ${Array.isArray(data.data) ? data.data.length : 'N/A'}\n\n`;
        resultDiv.textContent += `Response:\n${JSON.stringify(data, null, 2)}`;
      } catch (error) {
        resultDiv.textContent = `Error: ${error.message}`;
      }
    });
  </script>
</body>
</html>
